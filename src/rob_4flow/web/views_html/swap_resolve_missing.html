<h3 id="manual-swap-title">Couldn't assign hub to supplier X, with Zip Key ABC</h3>
<p>Please select a hub and choose how to proceed.</p>

<div style="margin-top:12px;">
    <label for="hub-select"><strong>Select Hub</strong></label><br/>
    <select id="hub-select" style="margin-top:6px; min-width:260px;">
        <option value="">Choose a hub...</option>
        <option value="hub1">Hub 1</option>
        <option value="hub2">Hub 2</option>
        <option value="hub3">Hub 3</option>
    </select>
</div>

<div style="margin-top:16px; text-align:right;">
    <button id="confirm-manual-swap-btn">Confirm Manual Swap</button>
    <button id="revert-swap-btn" style="margin-left:8px;">Revert Swap</button>
</div>
