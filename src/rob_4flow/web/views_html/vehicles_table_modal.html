<div class="modal-header">
  <h3>Vehicles</h3>
</div>

<div class="modal-body">
  <div style="margin-bottom:10px; display:flex; justify-content:flex-end; gap:8px;">
    <button id="vehicles-add">Add vehicle</button>
    <button id="vehicles-delete">Delete</button>
  </div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="vehicles-table" class="vehicles-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
  <th style="width:36px;text-align:center;">
    <div class="th-content center">
      <input type="checkbox" id="vehicles-select-all" />
    </div>
  </th>
  <th><div class="th-content"><span>ID</span><button class="table-filter-btn" data-field="id">▼</button></div></th>
  <th><div class="th-content"><span>Weight</span><button class="table-filter-btn" data-field="weight">▼</button></div></th>
  <th><div class="th-content"><span>Volume</span><button class="table-filter-btn" data-field="volume">▼</button></div></th>
  <th><div class="th-content"><span>Loading meters</span><button class="table-filter-btn" data-field="loading_meters">▼</button></div></th>
</tr>
      </thead>

      <tbody id="vehicles-tbody">
        <tr><td colspan="5" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="vehicles-close">Close</button>
</div>
