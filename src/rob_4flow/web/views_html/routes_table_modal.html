<div class="modal-header">
  <h3>Trips</h3>
</div>

<div class="modal-body">
  <div class="modal-controls" style="margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="routes-flow" value="parts" checked />
        <span>Parts</span>
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="routes-flow" value="empties" />
        <span>Empties</span>
      </label>
    </div>
  </div>

  <div id="routes-error" style="color:#b91c1c;display:none;margin-bottom:8px;"></div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="routes-table" class="routes-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
  <th><div class="th-content"><span>Route</span><button class="table-filter-btn" data-field="name">▼</button></div></th>
  <th><div class="th-content"><span>Vehicle</span><button class="table-filter-btn" data-field="vehicle">▼</button></div></th>
  <th><div class="th-content"><span>Roundtrip ID</span><button class="table-filter-btn" data-field="roundtrip_id">▼</button></div></th>
  <th><div class="th-content"><span>Frequency</span><button class="table-filter-btn" data-field="frequency">▼</button></div></th>
  <th><div class="th-content"><span>Base cost</span><button class="table-filter-btn" data-field="base_cost">▼</button></div></th>
  <th><div class="th-content"><span>Stop cost</span><button class="table-filter-btn" data-field="stop_cost">▼</button></div></th>
  <th><div class="th-content"><span>Weight utilization</span><button class="table-filter-btn" data-field="weight_utilization">▼</button></div></th>
  <th><div class="th-content"><span>Volume utilization</span><button class="table-filter-btn" data-field="volume_utilization">▼</button></div></th>
  <th><div class="th-content"><span>Loading meters utilization</span><button class="table-filter-btn" data-field="loading_meters_utilization">▼</button></div></th>
  <th><div class="th-content"><span>Shippers</span><button class="table-filter-btn" data-field="shippers">▼</button></div></th>
</tr>
      </thead>
      <tbody id="routes-tbody">
        <tr><td colspan="9" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="routes-close">Close</button>
</div>
