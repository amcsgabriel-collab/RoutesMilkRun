<div class="modal-header">
  <h3>Trips</h3>
</div>

<div class="modal-body">
  <div class="modal-controls" style="margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="routes-flow" value="parts" checked />
        <span>Parts</span>
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="routes-flow" value="empties" />
        <span>Empties</span>
      </label>
    </div>
  </div>

  <div id="routes-error" style="color:#b91c1c;display:none;margin-bottom:8px;"></div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="routes-table" class="routes-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">Name</th>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">Vehicle</th>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">Round Trip ID</th>
          <th style="text-align:center;padding:8px;border-bottom:1px solid #eee">Frequency</th>
          <th style="text-align:center;padding:8px;border-bottom:1px solid #eee">Base Cost</th>
          <th style="text-align:center;padding:8px;border-bottom:1px solid #eee">Stop Cost</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Weight Utilization [%]</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Volume Utilization [%]</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Loading Utilization [%]</th>
          <th style="text-align:center;padding:8px;border-bottom:1px solid #eee">Shippers</th>
        </tr>
      </thead>
      <tbody id="routes-tbody">
        <tr><td colspan="9" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="routes-close">Close</button>
</div>
