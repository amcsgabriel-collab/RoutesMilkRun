<div class="project-grid">

    <!-- TOP ROW -->
    <div class="overview-card">
        <h3>OVERVIEW</h3>
        <div id="overview-body"></div>
        <div id="plant">
            <label for="plant-name"><strong>Plant name:</strong></label>
            <label id="plant-name"> - </label>
        </div>
        <div class="field">
            <label for="region-select">Sourcing region:</label>
            <select id="region-select"></select>
        </div>
    </div>

    <div class="scenarios-card">
        <div class="scenarios-header">
            <h3>Scenarios</h3>
            <div class="scenarios-actions">
                <button id="sc-add" class="scenarios-actions button">Add</button>
                <button id="sc-duplicate" class="scenarios-actions button">Duplicate</button>
                <button id="sc-delete" class="scenarios-actions button">Delete</button>
                <button id="sc-save" class="scenarios-actions button">Save</button>
            </div>
        </div>
        <div id="scenarios-list" class="scenarios-list"></div>
    </div>

    <div class="map-panel">
        <div class="panel-tabs">
            <button class="panel-tab active" data-tab="map">Map</button>
            <button class="panel-tab" data-tab="kpis">KPIs</button>
        </div>

        <div class="panel-content">
            <div class="tab-pane active" id="tab-map">
                <div id="map-placeholder">Map</div>
            </div>

            <div class="tab-pane" id="tab-kpis">
                <div id="kpi-placeholder"></div>
            </div>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
        <div class="right-panel-rail">
            <button class="right-panel-toggle"
                    id="right-panel-toggle"
                    aria-expanded="true"
                    title="Collapse panel">
                ‹
            </button>
        </div>

        <div class="right-panel-content" id="right-panel-content">
            <div class="summary-card">
                <h3>Scenario summary</h3>
                <div id="scenario-summary"></div>
            </div>

            <div class="controls-panel">
                <div class="cmd-group">
                    <div class="cmd-title">Solver <br>Actions</div>
                    <div class="cmd-divider"></div>
                    <button id="swap-hub-direct">Swap Hub/Direct</button>
                    <button id="solver-run">Optimize</button>
                    <button id="lock-routes">Lock Routes</button>
                    <button id="block-routes">Block Routes</button>
                    <button id="solution-export">Export</button>
                </div>
                <div class="cmd-group">
                    <div class="cmd-title"><br> Tables</div>
                    <div class="cmd-divider"></div>
                    <button id="shippers-table">Shippers</button>
                    <button id="routes-table">Routes</button>
                    <button id="hubs-table">Hubs</button>
                    <button id="vehicles-table">Vehicles</button>
                </div>
            </div>
        </div>
    </div>
</div>
