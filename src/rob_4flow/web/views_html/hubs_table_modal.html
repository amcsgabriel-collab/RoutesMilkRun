<div class="modal-header">
  <h3>Hubs</h3>
</div>

<div class="modal-body">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
    <div style="display:flex;gap:12px;align-items:center;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="radio" name="hubs-flow" value="parts" checked />
        <span>Parts</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="radio" name="hubs-flow" value="empties" />
        <span>Empties</span>
      </label>
    </div>
  </div>

  <div id="hubs-error" style="display:none;color:#b42318;background:#fef3f2;border:1px solid #fecdca;padding:8px 10px;border-radius:6px;margin-bottom:10px;"></div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="hubs-table" class="hubs-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
  <th><div class="th-content"><span>Name</span><button class="table-filter-btn" data-field="name">▼</button></div></th>
  <th><div class="th-content"><span>Cofor</span><button class="table-filter-btn" data-field="cofor">▼</button></div></th>
  <th><div class="th-content"><span>Carrier</span><button class="table-filter-btn" data-field="carrier">▼</button></div></th>
  <th><div class="th-content"><span>First leg cost</span><button class="table-filter-btn" data-field="first_leg_cost">▼</button></div></th>
  <th><div class="th-content"><span>Linehaul frequency</span><button class="table-filter-btn" data-field="linehaul_frequency">▼</button></div></th>
  <th><div class="th-content"><span>Linehaul cost</span><button class="table-filter-btn" data-field="linehaul_cost">▼</button></div></th>
  <th><div class="th-content"><span>Linehaul weight</span><button class="table-filter-btn" data-field="linehaul_weight">▼</button></div></th>
  <th><div class="th-content"><span>Linehaul volume</span><button class="table-filter-btn" data-field="linehaul_volume">▼</button></div></th>
  <th><div class="th-content"><span>Linehaul loading meters</span><button class="table-filter-btn" data-field="linehaul_loading_meters">▼</button></div></th>
  <th><div class="th-content"><span>Coordinates</span><button class="table-filter-btn" data-field="coordinates">▼</button></div></th>
</tr>
      </thead>
      <tbody id="hubs-tbody">
        <tr><td colspan="10" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="hubs-close">Close</button>
</div>
