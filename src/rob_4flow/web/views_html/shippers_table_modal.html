<div class="modal-header">
  <h3>Shippers</h3>
</div>

<div class="modal-body">
  <div class="modal-controls" style="margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <input id="shippers-filter" placeholder="Filter by name..." style="width:60%;padding:6px;border-radius:6px;border:1px solid #ddd" />
    <button id="shippers-refresh" style="padding:6px 10px;">Refresh</button>

    <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="shippers-flow" value="parts" checked />
        <span>Parts</span>
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="shippers-flow" value="empties" />
        <span>Empties</span>
      </label>
    </div>
  </div>

  <div id="shippers-error" style="color:#b91c1c;display:none;margin-bottom:8px;"></div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="shippers-table" class="shippers-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th><div class="th-content"><span>Name</span><button class="table-filter-btn" data-field="name">▼</button></div></th>
          <th><div class="th-content"><span>Cofor</span><button class="table-filter-btn" data-field="cofor">▼</button></div></th>
          <th><div class="th-content"><span>Weight</span><button class="table-filter-btn" data-field="weight">▼</button></div></th>
          <th><div class="th-content"><span>Volume</span><button class="table-filter-btn" data-field="volume">▼</button></div></th>
          <th><div class="th-content"><span>Loading meters</span><button class="table-filter-btn" data-field="loading_meters">▼</button></div></th>
          <th><div class="th-content"><span>Route/Hub</span><button class="table-filter-btn" data-field="allocation_name">▼</button></div></th>
          <th><div class="th-content"><span>Network</span><button class="table-filter-btn" data-field="allocation_type">▼</button></div></th>
          <th><div class="th-content"><span>Original Network</span><button class="table-filter-btn" data-field="original_network">▼</button></div></th>
          <th><div class="th-content"><span>Coordinates</span><button class="table-filter-btn" data-field="coordinates">▼</button></div></th>
        </tr>
      </thead>
      <tr></tr>
      <tbody id="shippers-tbody">
        <tr><td colspan="8" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="shippers-close">Close</button>
</div>
