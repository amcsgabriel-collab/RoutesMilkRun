<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Route App</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" href="/icon.png"/>
</head>
<body>

<!-- Persistent menu bar -->
<header id="menu">
    <div class="menu-left">
        <button id="menu-new">New</button>
        <button id="menu-open">Open</button>
        <button id="menu-save">Save</button>
        <button id="menu-save-as">Save as</button>
    </div>
</header>

<!-- Main content area-->
<main id="content"></main>
<div id="ui-overlay" class="hidden">
    <div id="overlay-spinner">
        <div class="spinner"></div>
        <div id="overlay-text">Working…</div>
    </div>
</div>

<!-- Modal container (hidden by default) -->
<div id="modal-backdrop" class="hidden" role="dialog" aria-hidden="true">
    <div id="modal">
        <button id="modal-close" aria-label="Close">✖</button>
        <div id="modal-body"></div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
