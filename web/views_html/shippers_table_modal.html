<div class="modal-header">
  <h3>Shippers</h3>
</div>

<div class="modal-body">
  <div class="modal-controls" style="margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <input id="shippers-filter" placeholder="Filter by name..." style="width:60%;padding:6px;border-radius:6px;border:1px solid #ddd" />
    <button id="shippers-refresh" style="padding:6px 10px;">Refresh</button>

    <div style="display:flex;align-items:center;gap:10px;margin-left:auto;">
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="shippers-flow" value="parts" checked />
        <span>Parts</span>
      </label>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="radio" name="shippers-flow" value="empties" />
        <span>Empties</span>
      </label>
    </div>
  </div>

  <div id="shippers-error" style="color:#b91c1c;display:none;margin-bottom:8px;"></div>

  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="shippers-table" class="shippers-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">Name</th>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">COFOR</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Weight [kg]</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Volume [m³]</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Loading Meters [m]</th>
          <th style="text-align:center;padding:8px;border-bottom:1px solid #eee">Coordinates</th>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">Original Network</th>
        </tr>
      </thead>
      <tbody id="shippers-tbody">
        <tr><td colspan="7" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="shippers-close">Close</button>
</div>
