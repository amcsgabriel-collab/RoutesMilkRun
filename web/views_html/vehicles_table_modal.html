<div class="modal-header">
  <h3>Vehicles</h3>
</div>

<div class="modal-body">
  <div style="overflow:auto; max-height:420px; border-radius:6px; background:#fff;">
    <table id="vehicles-table" class="vehicles-table" style="width:100%;border-collapse:collapse">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px;border-bottom:1px solid #eee">ID</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Weight Capacity</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Volume Capacity</th>
          <th style="text-align:right;padding:8px;border-bottom:1px solid #eee">Loading Meters Capacity</th>
        </tr>
      </thead>
      <tbody id="vehicles-tbody">
        <tr><td colspan="5" style="padding:20px;text-align:center;color:#6b7280">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-footer" style="margin-top:10px;text-align:right;">
  <button id="vehicles-close">Close</button>
</div>
